<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kocok Dadu Pop Art 🎲✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dice-container">
        <header class="dice-header">
            <h1>🎲 KOCOK DADU</h1>
            <p>Klik tombol di bawah untuk mengocok dadu dan menghasilkan angka acak 1 sampai 6!</p>
        </header>

        <main class="dice-body">
            <div id="visual-dadu" class="dice-box">⚄</div>
        </main>

        <div class="info-board">
            <p id="txt-status">Silakan kocok dadu!</p>
        </div>

        <footer class="dice-footer">
            <button id="btn-roll" class="btn-pop">Kocok Sekarang 🚀</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
